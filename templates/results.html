<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clarity Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="inner-page-body">
    <div class="content-container">
        <div class="variable-entry-card">
            <h2>Enter Your Nouns</h2>
            <div class="input-field">
                <label for="vars">Variables (comma-separated):</label>
                <input type="text" id="vars" placeholder="e.g. moonlight, nightshade, twilight">
            </div>
            <button id="activation-button" onclick="submitVariables()">Get Results</button>
        </div>

        <div class="results-card">
            <h2>Raw Commonality</h2>
            <div class="results-tier"><p id="rawResults">Awaiting input...</p></div>

            <h2>Synthesized Summaries</h2>
            <div class="results-tier">
                <p><strong>3-Sentence:</strong> <span id="summary3">–</span></p>
                <p><strong>2-Sentence:</strong> <span id="summary2">–</span></p>
                <p><strong>1-Sentence:</strong> <span id="summary1">–</span></p>
            </div>
        </div>
    </div>
<div class="results-card" id="results-container" style="display: none;">
  ...
</div>
    <script>
        function submitVariables() {
            const input = document.getElementById("vars").value;
            const variables = input.split(",").map(v => v.trim());

            fetch("/process", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ variables }),
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("results-container").style.display = "block";
                document.getElementById("rawResults").innerText = data.results.level1 || "None found.";
                document.getElementById("summary3").innerText = data.summary.summary_3 || "–";
                document.getElementById("summary2").innerText = data.summary.summary_2 || "–";
                document.getElementById("summary1").innerText = data.summary.summary_1 || "–";
            })
            .catch(error => {
                console.error("Error:", error);
                alert("Something went wrong. Check console.");
            });
        }
    </script>
</body>
</html>
